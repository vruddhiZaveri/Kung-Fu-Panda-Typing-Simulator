<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Dumpling Dash</title>
    <link rel="stylesheet" href="style.css">
</head>

<body>

    <div id="main-menu">
        <video id="menu-video" autoplay loop muted playsinline>
            <source src="public/assets/YOUR_VIDEO_FILE.mp4" type="video/mp4">
        </video>

        <div class="menu-content" id="menu-box">
            <h1>DUMPLING DASH</h1>
            <button class="menu-btn" id="btn-play">PLAY GAME</button>
            <button class="menu-btn" id="btn-exit">EXIT</button>
        </div>
    </div>

    <div id="game-wrapper">
        <div id="game-header">
            <div class="hud-box">
                <span style="color: #ff4757;">HP: <span id="hp-val">100</span>%</span><br>
                <span style="color: #2ed573;">SCORE: <span id="score-val">0</span></span>
            </div>

            <div id="target-ui">
                <span>INCOMING DUMPLING</span>
                <div id="target-letter">-</div>
            </div>

            <div class="hud-box" style="text-align: right;">
                LVL: <span id="lvl-val">1</span><br>
                TARGET: <span id="goal-val">0/8</span>
            </div>
        </div>

        <div id="game-container">
            <video id="env-video" autoplay loop muted playsinline>
                <source src="public/assets/environment.mp4" type="video/mp4">
            </video>

            <canvas id="gameCanvas" width="1200" height="600"></canvas>
        </div>
    </div>

    <script src="script.js"></script>
</body>

</html>
